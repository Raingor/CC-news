<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News & Horoscope Hub - 每日新聞與星座運程</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23FAF6EF'/%3E%3Cpath d='M0 0h32v5H0z' fill='%23C43A24'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='17' font-weight='700' fill='%232C2416' text-anchor='middle'%3EN%26H%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="masthead">
        <div class="masthead-left">
          <span class="masthead-suptitle">DAILY INTELLIGENCE</span>
          <h1>News & Horoscope</h1>
        </div>
        <div class="masthead-right">
          <span class="header-status">
            <span class="update-time" id="update-time">載入中...</span>
          </span>
          <span class="article-count" id="article-count"></span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 新聞板塊 -->
    <section id="news-section">
      <h2 class="section-title">今日新聞</h2>
      
      <!-- 分類標籤 -->
      <div class="category-tabs">
        <button class="tab active" data-category="all">全部</button>
        <button class="tab" data-category="yahoo-international">Yahoo 國際</button>
        <button class="tab" data-category="bbc-world">BBC 國際</button>
        <button class="tab" data-category="bbc-hongkong">香港新聞</button>
      </div>
      
      <!-- 新聞卡片網格 -->
      <div class="news-grid" id="news-grid">
        <div class="loading">正在載入新聞...</div>
      </div>
    </section>

    <!-- 星座運程板塊 -->
    <section id="horoscope-section">
      <h2 class="section-title">每日星座運程</h2>
      <p class="horoscope-date" id="horoscope-date"></p>
      
      <!-- 星座卡片網格 -->
      <div class="horoscope-grid" id="horoscope-grid">
        <div class="loading">正在載入星座運程...</div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Powered by GitHub Pages · 數據每 6 小時自動更新</p>
      <p style="margin-top: 8px; font-size: 11px;">© 2026 CC News Hub. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
