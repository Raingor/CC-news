<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News & Horoscope Hub - 每日新聞與星座運程</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23FAF6EF'/%3E%3Cpath d='M0 0h32v5H0z' fill='%23C43A24'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='17' font-weight='700' fill='%232C2416' text-anchor='middle'%3EN%26H%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;700&family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="masthead">
        <div class="masthead-left">
          <span class="masthead-suptitle">DAILY INTELLIGENCE</span>
          <h1>News & Horoscope</h1>
        </div>
        <div class="masthead-right">
          <div class="theme-switcher">
            <button class="theme-btn" id="theme-btn" aria-label="切換風格" title="切換風格">
              <span class="theme-btn-icon">🎨</span>
              <span class="theme-btn-label" id="theme-label">風格</span>
              <span class="theme-btn-arrow">▾</span>
            </button>
            <div class="theme-menu" id="theme-menu">
              <button class="theme-option active" data-theme="default">
                <span class="theme-option-dot dot-default"></span>
                預設風格
              </button>
              <button class="theme-option" data-theme="sakura">
                <span class="theme-option-dot dot-sakura"></span>
                🌸 日本櫻花
              </button>
              <button class="theme-option" data-theme="gothic">
                <span class="theme-option-dot dot-gothic"></span>
                🕯️ 歐式哥特
              </button>
              <button class="theme-option" data-theme="chinese">
                <span class="theme-option-dot dot-chinese"></span>
                🏮 中國風
              </button>
            </div>
          </div>
          <span class="header-status">
            <span class="update-time" id="update-time">載入中...</span>
          </span>
          <span class="article-count" id="article-count"></span>
        </div>
      </div>

      <nav class="section-nav" id="section-nav" aria-label="Section navigation">
        <a href="#news-section" class="section-nav-link active" data-section="news">
          <span class="section-nav-icon">📰</span>
          <span class="section-nav-label">今日新聞</span>
        </a>
        <span class="section-nav-sep"></span>
        <a href="#horoscope-section" class="section-nav-link" data-section="horoscope">
          <span class="section-nav-icon">🔮</span>
          <span class="section-nav-label">星座運程</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- 新聞板塊 -->
    <section id="news-section">
      <h2 class="section-title" id="news-title">
        <span class="section-title-icon">📰</span>
        今日新聞
      </h2>
      
      <!-- 分類標籤 -->
      <div class="category-tabs">
        <button class="tab active" data-category="all">全部</button>
        <button class="tab" data-category="guardian-world">Guardian 國際</button>
        <button class="tab" data-category="cnn-world">CNN 國際</button>
        <button class="tab" data-category="bbc-chinese">BBC 中文</button>
      </div>
      
      <!-- 新聞卡片網格 -->
      <div class="news-grid" id="news-grid">
        <div class="loading">正在載入新聞...</div>
      </div>
    </section>

    <!-- 板塊分割線 -->
    <div class="section-divider">
      <span class="divider-ornament">❦</span>
    </div>

    <!-- 星座運程板塊 -->
    <section id="horoscope-section">
      <h2 class="section-title" id="horoscope-title">
        <span class="section-title-icon">🔮</span>
        每日星座運程
      </h2>
      <p class="horoscope-date" id="horoscope-date"></p>
      
      <!-- 星座卡片網格 -->
      <div class="horoscope-grid" id="horoscope-grid">
        <div class="loading">正在載入星座運程...</div>
      </div>
    </section>
  </main>

  <!-- 浮動跳轉按鈕 -->
  <button class="scroll-jump" id="scroll-jump" aria-label="跳至星座運程">
    <span class="jump-icon">🔮</span>
    <span class="jump-label" id="jump-label">星座運程</span>
    <span class="jump-arrow">↓</span>
  </button>

  <footer>
    <div class="container">
      <p>Powered by GitHub Pages · 數據每 6 小時自動更新</p>
      <p style="margin-top: 8px; font-size: 11px;">© 2026 CC News Hub. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
