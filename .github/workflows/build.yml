name: Build & Deploy News Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時執行 (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:       # 支持手動觸發
  push:
    branches: [main]       # 代碼推送時執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Fetch news & horoscope data
        run: npm run build
        
      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "📰 Update news data $(date '+%Y-%m-%d %H:%M UTC')"
          git push
