name: Fetch & Deploy News Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時執行 (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:       # 支持手動觸發
  push:
    branches: [main]       # 代碼推送時部署

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    concurrency:
      group: pages
      cancel-in-progress: false
    
    permissions:
      contents: write  # 用於推送到 gh-pages 分支
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Fetch news & horoscope data
        run: npm run build
        
      - name: Add .nojekyll
        run: touch .nojekyll
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
